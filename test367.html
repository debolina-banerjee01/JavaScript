<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given a circular array, compute its maximum subarray sum in O(n) time. A
      subarray can be empty, and in this case the sum is 0.
    </title>
  </head>
  <body>
    <script>
      function maxCircularSubarray(arr) {
        let totalSum = 0;

        let maxEndingHere = 0;
        let maxSoFar = 0;

        let minEndingHere = 0;
        let minSoFar = 0;

        for (let num of arr) {
          totalSum += num;

          // Kadane for max subarray
          maxEndingHere = Math.max(0, maxEndingHere + num);
          maxSoFar = Math.max(maxSoFar, maxEndingHere);

          // Kadane for min subarray
          minEndingHere = Math.min(0, minEndingHere + num);
          minSoFar = Math.min(minSoFar, minEndingHere);
        }

        let circularMax = totalSum - minSoFar;

        return Math.max(maxSoFar, circularMax);
      }
      console.log(maxCircularSubarray([8, -1, 3, 4]));
    </script>
  </body>
</html>
