<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given two rectangles on a 2D graph, return the area of their intersection. If the rectangles don't intersect, return 0.

For example, given the following rectangles:

{
    "top_left": (1, 4),
    "dimensions": (3, 3) # width, height
}
and

{
    "top_left": (0, 5),
    "dimensions": (4, 3) # width, height
}
return 6.
    </title>
</head>
<body>
    <script>
function intersectionArea(rect1, rect2) {
    const [x1, y1] = rect1.top_left;
    const [w1, h1] = rect1.dimensions;

    const [x2, y2] = rect2.top_left;
    const [w2, h2] = rect2.dimensions;

    // Rectangle 1 edges
    const left1 = x1;
    const right1 = x1 + w1;
    const top1 = y1;
    const bottom1 = y1 - h1;

    // Rectangle 2 edges
    const left2 = x2;
    const right2 = x2 + w2;
    const top2 = y2;
    const bottom2 = y2 - h2;

    const overlapWidth =
        Math.min(right1, right2) - Math.max(left1, left2);

    const overlapHeight =
        Math.min(top1, top2) - Math.max(bottom1, bottom2);

    if (overlapWidth <= 0 || overlapHeight <= 0) {
        return 0;
    }

    return overlapWidth * overlapHeight;
}

// Example
const rect1 = {
    top_left: [1, 4],
    dimensions: [3, 3]
};

const rect2 = {
    top_left: [0, 5],
    dimensions: [4, 3]
};

console.log(intersectionArea(rect1, rect2)); // 6
    </script>
</body>
</html>
