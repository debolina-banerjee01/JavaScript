<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Run-length encoding is a fast and simple method of encoding strings. The
      basic idea is to represent repeated successive characters as a single
      count and character. For example, the string "AAAABBBCCDAA" would be
      encoded as "4A3B2C1D2A". Implement run-length encoding and decoding. You
      can assume the string to be encoded have no digits and consists solely of
      alphabetic characters. You can assume the string to be decoded is valid.
    </title>
  </head>
  <body>
    <script>
      function encode(str) {
        if (!str) return "";

        let result = "";
        let count = 1;

        for (let i = 1; i <= str.length; i++) {
          if (str[i] === str[i - 1]) {
            count++;
          } else {
            result += count + str[i - 1];
            count = 1;
          }
        }

        return result;
      }
      function decode(str) {
        let result = "";
        let count = "";

        for (let char of str) {
          if (!isNaN(char)) {
            count += char; // build multi-digit number
          } else {
            result += char.repeat(Number(count));
            count = "";
          }
        }

        return result;
      }
      const original = "AAAABBBCCDAA";

      const encoded = encode(original);
      console.log(encoded); // "4A3B2C1D2A"

      const decoded = decode(encoded);
      console.log(decoded); // "AAAABBBCCDAA"
    </script>
  </body>
</html>
