<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given a list of numbers and a number k, return whether any two numbers from the list add up to k.

For example, given [10, 15, 3, 7] and k of 17, return true since 10 + 7 is 17.


    </title>
</head>
<body>
    <script>
function hasTwoSum(nums, k) {
    const seen = new Set();

    for (let num of nums) {
        const complement = k - num;

        if (seen.has(complement)) {
            return true;
        }

        seen.add(num);
    }

    return false;
}

// Example usage
console.log(hasTwoSum([10, 15, 3, 7], 17)); // true
console.log(hasTwoSum([1, 2, 3, 4], 8));    // false

    </script>
</body>
</html>
