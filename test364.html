<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given an array of elements, return the length of the longest subarray where all its elements are distinct.

For example, given the array [5, 1, 3, 5, 2, 3, 4, 1], return 5 as the longest subarray of distinct elements is [5, 2, 3, 4, 1].
    </title>
</head>
<body>
    <script>
function longestDistinctSubarray(arr) {
  const set = new Set();
  let left = 0;
  let maxLength = 0;

  for (let right = 0; right < arr.length; right++) {
    while (set.has(arr[right])) {
      set.delete(arr[left]);
      left++;
    }

    set.add(arr[right]);
    maxLength = Math.max(maxLength, right - left + 1);
  }

  return maxLength;
}

// Example
const arr = [5, 1, 3, 5, 2, 3, 4, 1];
console.log(longestDistinctSubarray(arr)); // 5
    </script>
</body>
</html>
