<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given a linked list, rearrange the node values such that they appear in
      alternating low -> high -> low -> high ... form. For example, given 1 -> 2
      -> 3 -> 4 -> 5, you should return 1 -> 3 -> 2 -> 5 -> 4.
    </title>
  </head>
  <body>
    <script>
      class ListNode {
        constructor(val) {
          this.val = val;
          this.next = null;
        }
      }

      function rearrangeZigZag(head) {
        if (!head || !head.next) return head;

        let current = head;
        let expectLess = true; // true means current <= next

        while (current && current.next) {
          if (expectLess) {
            // low -> high
            if (current.val > current.next.val) {
              // swap values
              let temp = current.val;
              current.val = current.next.val;
              current.next.val = temp;
            }
          } else {
            // high -> low
            if (current.val < current.next.val) {
              // swap values
              let temp = current.val;
              current.val = current.next.val;
              current.next.val = temp;
            }
          }

          expectLess = !expectLess; // toggle pattern
          current = current.next;
        }

        return head;
      }
    </script>
  </body>
</html>
