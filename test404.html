<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given an undirected graph G, check whether it is bipartite. Recall that a
      graph is bipartite if its vertices can be divided into two independent
      sets, U and V, such that no edge connects vertices of the same set.
    </title>
  </head>
  <body>
    <script>
      function isBipartite(graph) {
        const n = graph.length;
        const color = new Array(n).fill(-1); // -1 means uncolored

        for (let start = 0; start < n; start++) {
          if (color[start] !== -1) continue;

          const queue = [];
          queue.push(start);
          color[start] = 0;

          while (queue.length > 0) {
            const node = queue.shift();

            for (let neighbor of graph[node]) {
              if (color[neighbor] === -1) {
                // Assign opposite color
                color[neighbor] = 1 - color[node];
                queue.push(neighbor);
              } else if (color[neighbor] === color[node]) {
                // Same color conflict
                return false;
              }
            }
          }
        }

        return true;
      }
      // Graph as adjacency list
      const graph1 = [
        [1, 3], // 0
        [0, 2], // 1
        [1, 3], // 2
        [0, 2], // 3
      ];

      console.log(isBipartite(graph1)); // true

      const graph2 = [
        [1, 2],
        [0, 2],
        [0, 1],
      ];

      console.log(isBipartite(graph2)); // false
    </script>
  </body>
</html>
