<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are given a string of length N and a parameter k. The string can be manipulated by taking one of the first k letters and moving it to the end.

Write a program to determine the lexicographically smallest string that can be created after an unlimited number of moves.

For example, suppose we are given the string daily and k = 1. The best we can create in this case is ailyd.
    </title>
</head>
<body>
    <script>
function orderlyQueue(s, k) {
    // Case 1: Only rotations allowed
    if (k === 1) {
        let smallest = s;

        for (let i = 1; i < s.length; i++) {
            let rotated = s.slice(i) + s.slice(0, i);
            if (rotated < smallest) {
                smallest = rotated;
            }
        }

        return smallest;
    }

    // Case 2: Any permutation possible
    return s.split('').sort().join('');
}

// Example usage:
console.log(orderlyQueue("daily", 1)); // "ailyd"
console.log(orderlyQueue("cba", 2));   // "abc"
    </script>
</body>
</html>
