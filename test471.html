<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Given a string of parentheses, write a function to compute the minimum number of parentheses to be removed to make the string valid (i.e. each open parenthesis is eventually closed).

For example, given the string "()())()", you should return 1. Given the string ")(", you should return 2, since we must remove all of them.

    </title>
</head>
<body>
    <script>
        function minRemovalsToMakeValid(s) {
    let open = 0;
    let remove = 0;

    for (const char of s) {
        if (char === '(') {
            open++;
        } else if (char === ')') {
            if (open > 0) {
                open--;
            } else {
                remove++;
            }
        }
    }

    return remove + open;
}

// Examples
console.log(minRemovalsToMakeValid("()())()")); // 1
console.log(minRemovalsToMakeValid(")("));      // 2
console.log(minRemovalsToMakeValid("((("));     // 3
console.log(minRemovalsToMakeValid("(()"));     // 1
console.log(minRemovalsToMakeValid("()()"));    // 0
    </script>
</body>
</html>
