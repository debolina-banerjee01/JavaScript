<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given a stack of N elements, interleave the first half of the stack with the second half reversed using only one other queue. This should be done in-place.

Recall that you can only push or pop from a stack, and enqueue or dequeue from a queue.

For example, if the stack is [1, 2, 3, 4, 5], it should become [1, 5, 2, 4, 3]. If the stack is [1, 2, 3, 4], it should become [1, 4, 2, 3].
    </title>
</head>
<body>
    <script>
function interleaveStack(stack) {
    const n = stack.length;
    const queue = [];

    // Move stack -> queue
    while (stack.length) {
        queue.push(stack.pop());
    }

    // Queue currently contains top-to-bottom order.
    // Reverse it so queue becomes bottom-to-top order.
    const temp = [];
    while (queue.length) {
        temp.push(queue.shift());
    }
    while (temp.length) {
        queue.push(temp.pop());
    }

    const firstHalfSize = Math.ceil(n / 2);

    const firstHalf = [];
    const secondHalf = [];

    // Split queue into halves
    for (let i = 0; i < firstHalfSize; i++) {
        firstHalf.push(queue.shift());
    }

    while (queue.length) {
        secondHalf.push(queue.shift());
    }

    // Build result in queue
    while (firstHalf.length || secondHalf.length) {
        if (firstHalf.length) {
            queue.push(firstHalf.shift());
        }

        if (secondHalf.length) {
            queue.push(secondHalf.pop()); // reversed second half
        }
    }

    // Move queue -> stack
    while (queue.length) {
        stack.push(queue.shift());
    }

    return stack;
}

// Examples
let s1 = [1, 2, 3, 4, 5];
console.log(interleaveStack(s1)); // [1, 5, 2, 4, 3]

let s2 = [1, 2, 3, 4];
console.log(interleaveStack(s2)); // [1, 4, 2, 3]
  
    </script>
</body>
</html>
