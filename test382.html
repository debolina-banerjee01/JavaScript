<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      You are given an array of nonnegative integers. Let's say you start at the
      beginning of the array and are trying to advance to the end. You can
      advance at most, the number of steps that you're currently on. Determine
      whether you can get to the end of the array. For example, given the array
      [1, 3, 1, 2, 0, 1], we can go from indices 0 -> 1 -> 3 -> 5, so return
      true. Given the array [1, 2, 1, 0, 0], we can't reach the end, so return
      false.
    </title>
  </head>
  <body>
    <script>
      function canReachEnd(nums) {
        let maxReach = 0;

        for (let i = 0; i < nums.length; i++) {
          // If current index is beyond reachable range
          if (i > maxReach) {
            return false;
          }

          // Update the farthest we can reach
          maxReach = Math.max(maxReach, i + nums[i]);

          // Optional early exit
          if (maxReach >= nums.length - 1) {
            return true;
          }
        }

        return true;
      }
      console.log(canReachEnd([1, 3, 1, 2, 0, 1])); // true
    </script>
  </body>
</html>
