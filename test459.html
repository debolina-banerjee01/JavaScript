<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given a start word, an end word, and a dictionary of valid words, find the shortest transformation sequence from start to end such that only one letter is changed at each step of the sequence, and each transformed word exists in the dictionary. If there is no possible transformation, return null. Each word in the dictionary have the same length as start and end and is lowercase.

For example, given start = "dog", end = "cat", and dictionary = {"dot", "dop", "dat", "cat"}, return ["dog", "dot", "dat", "cat"].

Given start = "dog", end = "cat", and dictionary = {"dot", "tod", "dat", "dar"}, return null as there is no possible transformation from dog to cat.
    </title>
</head>
<body>
    <script>
function wordLadder(start, end, dictionary) {
    const dict = new Set(dictionary);

    // End word must exist in dictionary
    if (!dict.has(end)) return null;

    const queue = [[start]];
    const visited = new Set([start]);

    while (queue.length > 0) {
        const path = queue.shift();
        const word = path[path.length - 1];

        if (word === end) {
            return path;
        }

        // Try changing every character
        for (let i = 0; i < word.length; i++) {
            for (let c = 97; c <= 122; c++) {
                const char = String.fromCharCode(c);

                if (char === word[i]) continue;

                const nextWord =
                    word.slice(0, i) + char + word.slice(i + 1);

                if (dict.has(nextWord) && !visited.has(nextWord)) {
                    visited.add(nextWord);
                    queue.push([...path, nextWord]);
                }
            }
        }
    }

    return null;
}
const start = "dog";
const end = "cat";
const dict = ["dot", "dop", "dat", "cat"];

console.log(wordLadder(start, end, dict));
    </script>
</body>
</html>
