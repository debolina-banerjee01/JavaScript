<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given a function that generates perfectly random numbers between 1 and k
      (inclusive), where k is an input, write a function that shuffles a deck of
      cards represented as an array using only swaps. It should run in O(N)
      time.
    </title>
  </head>
  <body>
    <script>
      // rand(k): returns random integer from 1 to k (inclusive)
      // Example mock (you can assume it's given)
      function rand(k) {
        return Math.floor(Math.random() * k) + 1;
      }

      function shuffle(deck) {
        const n = deck.length;

        for (let i = 0; i < n; i++) {
          // random index from i to n-1
          const r = i + rand(n - i) - 1;

          // swap deck[i] and deck[r]
          [deck[i], deck[r]] = [deck[r], deck[i]];
        }

        return deck;
      }
      const deck = [1, 2, 3, 4, 5];
      console.log(shuffle(deck));
    </script>
  </body>
</html>
