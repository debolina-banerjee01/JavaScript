<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given a set of characters C and an integer k, a De Bruijn sequence is a
      cyclic sequence in which every possible k-length string of characters in C
      occurs exactly once. For example, suppose C = {0, 1} and k = 3. Then our
      sequence should contain the substrings {'000', '001', '010', '011', '100',
      '101', '110', '111'}, and one possible solution would be 00010111. Create
      an algorithm that finds a De Bruijn sequence.
    </title>
  </head>
  <body>
    <script>
      function deBruijn(C, k) {
        const alphabet = C;
        const n = alphabet.length;
        const visited = new Set();
        const result = [];

        function dfs(node) {
          for (let i = 0; i < n; i++) {
            const edge = node + alphabet[i];
            if (!visited.has(edge)) {
              visited.add(edge);
              dfs(edge.slice(1));
              result.push(alphabet[i]);
            }
          }
        }

        // Start with k-1 zeros (or first character)
        const start = alphabet[0].repeat(k - 1);
        dfs(start);

        return start + result.reverse().join("");
      }
      console.log(deBruijn(["0", "1"], 3));
    </script>
  </body>
</html>
