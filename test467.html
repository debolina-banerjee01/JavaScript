<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given a 2D board of characters and a word, find if the word exists in the grid.

The word can be constructed from letters of sequentially adjacent cell, where "adjacent" cells are those horizontally or vertically neighboring. The same letter cell may not be used more than once.

For example, given the following board:

[
  ['A','B','C','E'],
  ['S','F','C','S'],
  ['A','D','E','E']
]
exists(board, "ABCCED") returns true, exists(board, "SEE") returns true, exists(board, "ABCB") returns false.


    </title>
</head>
<body>
    <script>
function exists(board, word) {
    if (!board || board.length === 0) return false;

    const rows = board.length;
    const cols = board[0].length;

    function dfs(r, c, index) {
        // All characters matched
        if (index === word.length) return true;

        // Out of bounds or character doesn't match
        if (
            r < 0 ||
            c < 0 ||
            r >= rows ||
            c >= cols ||
            board[r][c] !== word[index]
        ) {
            return false;
        }

        // Mark current cell as visited
        const temp = board[r][c];
        board[r][c] = "#";

        // Explore all 4 directions
        const found =
            dfs(r + 1, c, index + 1) ||
            dfs(r - 1, c, index + 1) ||
            dfs(r, c + 1, index + 1) ||
            dfs(r, c - 1, index + 1);

        // Restore the cell
        board[r][c] = temp;

        return found;
    }

    // Try every cell as a starting point
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (dfs(r, c, 0)) {
                return true;
            }
        }
    }

    return false;
}
const board = [
    ['A', 'B', 'C', 'E'],
    ['S', 'F', 'C', 'S'],
    ['A', 'D', 'E', 'E']
];

console.log(exists(board, "ABCCED")); // true
console.log(exists(board, "SEE"));    // true
console.log(exists(board, "ABCB"));   // false
    </script>
</body>
</html>
