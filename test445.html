<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      You are given an array representing the heights of neighboring buildings
      on a city street, from east to west. The city assessor would like you to
      write an algorithm that returns how many of these buildings have a view of
      the setting sun, in order to properly value the street. For example, given
      the array [3, 7, 8, 3, 6, 1], you should return 3, since the top floors of
      the buildings with heights 8, 6, and 1 all have an unobstructed view to
      the west. Can you do this using just one forward pass through the array?
    </title>
  </head>
  <body>
    <script>
      function countSunsetViews(buildings) {
        const stack = [];

        for (const height of buildings) {
          while (stack.length > 0 && stack[stack.length - 1] <= height) {
            stack.pop();
          }
          stack.push(height);
        }

        return stack.length;
      }

      // Example
      const buildings = [3, 7, 8, 3, 6, 1];
      console.log(countSunsetViews(buildings)); // 3
    </script>
  </body>
</html>
