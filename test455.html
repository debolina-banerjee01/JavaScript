<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      You are given an string representing the initial conditions of some
      dominoes. Each element can take one of three values: L, meaning the domino
      has just been pushed to the left, R, meaning the domino has just been
      pushed to the right, or ., meaning the domino is standing still. Determine
      the orientation of each tile when the dominoes stop falling. Note that if
      a domino receives a force from the left and right side simultaneously, it
      will remain upright. For example, given the string .L.R....L, you should
      return LL.RRRLLL. Given the string ..R...L.L, you should return ..RR.LLLL.
    </title>
  </head>
  <body>
    <script>
      function pushDominoes(dominoes) {
        const arr = ("L" + dominoes + "R").split("");
        const result = [...arr];

        let left = 0;

        for (let right = 1; right < arr.length; right++) {
          if (arr[right] === ".") continue;

          const middle = right - left - 1;

          if (arr[left] === arr[right]) {
            // Same direction: fill everything
            for (let k = left + 1; k < right; k++) {
              result[k] = arr[left];
            }
          } else if (arr[left] === "R" && arr[right] === "L") {
            // Opposite directions: move inward
            let i = left + 1;
            let j = right - 1;

            while (i < j) {
              result[i++] = "R";
              result[j--] = "L";
            }
            // If i == j, middle domino stays '.'
          }
          // L...R: leave dots unchanged

          left = right;
        }

        // Remove the virtual dominoes
        return result.slice(1, -1).join("");
      }

      // Example Usage
      console.log(pushDominoes(".L.R....L")); // "LL.RRRLLL"
      console.log(pushDominoes("..R...L.L")); // "..RR.LLLL"
    </script>
  </body>
</html>
