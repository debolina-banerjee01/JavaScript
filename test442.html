<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Word sense disambiguation is the problem of determining which sense a word takes on in a particular setting, if that word has multiple meanings. For example, in the sentence "I went to get money from the bank", bank probably means the place where people deposit money, not the land beside a river or lake.

Suppose you are given a list of meanings for several words, formatted like so:

{
    "word_1": ["meaning one", "meaning two", ...],
    ...
    "word_n": ["meaning one", "meaning two", ...]
}
Given a sentence, most of whose words are contained in the meaning list above, create an algorithm that determines the likely sense of each possibly ambiguous word.
    </title>
  </head>
  <body>
    <script>
      function tokenize(text) {
        return text
          .toLowerCase()
          .replace(/[^\w\s]/g, "")
          .split(/\s+/)
          .filter(Boolean);
      }

      function disambiguate(sentence, meanings) {
        const context = new Set(tokenize(sentence));
        const result = {};

        for (const word in meanings) {
          if (!context.has(word.toLowerCase())) {
            continue;
          }

          let bestMeaning = null;
          let bestScore = -1;

          for (const meaning of meanings[word]) {
            const meaningWords = tokenize(meaning);

            let score = 0;

            for (const mw of meaningWords) {
              if (context.has(mw)) {
                score++;
              }
            }

            if (score > bestScore) {
              bestScore = score;
              bestMeaning = meaning;
            }
          }

          result[word] = bestMeaning;
        }

        return result;
      }
      const meanings = {
        bank: [
          "financial institution that stores money",
          "land alongside a river",
        ],
        money: ["currency used for buying goods"],
        river: ["natural stream of water"],
      };

      const sentence = "I went to get money from the bank";

      console.log(disambiguate(sentence, meanings));
    </script>
  </body>
</html>
