<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given a singly linked list and an integer k, remove the kth last element
      from the list. k is guaranteed to be smaller than the length of the list.
      The list is very long, so making more than one pass is prohibitively
      expensive. Do this in constant space and in one pass.
    </title>
  </head>
  <body>
    <script>
      class ListNode {
        constructor(val) {
          this.val = val;
          this.next = null;
        }
      }

      function removeKthFromEnd(head, k) {
        let fast = head;
        let slow = head;

        // Move fast pointer k steps ahead
        for (let i = 0; i < k; i++) {
          fast = fast.next;
        }

        // If fast is null, we need to remove the head
        if (fast === null) {
          return head.next;
        }

        // Move both pointers until fast reaches the last node
        while (fast.next !== null) {
          fast = fast.next;
          slow = slow.next;
        }

        // Remove the kth last node
        slow.next = slow.next.next;

        return head;
      }
    </script>
  </body>
</html>
