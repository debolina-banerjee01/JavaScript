<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The edit distance between two strings refers to the minimum number of character insertions, deletions, and substitutions required to change one string to the other. For example, the edit distance between “kitten” and “sitting” is three: substitute the “k” for “s”, substitute the “e” for “i”, and append a “g”.

Given two strings, compute the edit distance between them.
    </title>
</head>
<body>
    <script>
function editDistance(word1, word2) {
  const m = word1.length;
  const n = word2.length;

  // Create DP table
  const dp = Array.from({ length: m + 1 }, () =>
    Array(n + 1).fill(0)
  );

  // Base cases
  for (let i = 0; i <= m; i++) dp[i][0] = i; // deletions
  for (let j = 0; j <= n; j++) dp[0][j] = j; // insertions

  // Fill table
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (word1[i - 1] === word2[j - 1]) {
        dp[i][j] = dp[i - 1][j - 1]; // no operation
      } else {
        dp[i][j] = Math.min(
          dp[i - 1][j] + 1,     // delete
          dp[i][j - 1] + 1,     // insert
          dp[i - 1][j - 1] + 1  // replace
        );
      }
    }
  }

  return dp[m][n];
}

// Example usage
console.log(editDistance("kitten", "sitting")); // 3
console.log(editDistance("flaw", "lawn"));      // 2
    </script>
</body>
</html>
