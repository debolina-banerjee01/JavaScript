<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      An XOR linked list is a more memory efficient doubly linked list. Instead
      of each node holding next and prev fields, it holds a field named both,
      which is an XOR of the next node and the previous node. Implement an XOR
      linked list; it has an add(element) which adds the element to the end, and
      a get(index) which returns the node at index. If using a language that has
      no pointers (such as Python), you can assume you have access to
      get_pointer and dereference_pointer functions that converts between nodes
      and memory addresses.
    </title>
  </head>
  <body>
    <script>
      class Node {
        constructor(value) {
          this.value = value;
          this.both = 0; // XOR of prev and next node IDs
        }
      }

      class XORLinkedList {
        constructor() {
          this.head = null;
          this.tail = null;

          this.memory = new Map(); // Simulated memory: id -> node
          this.nextId = 1;
        }

        // Simulate get_pointer
        getPointer(node) {
          if (!node) return 0;

          for (const [id, storedNode] of this.memory.entries()) {
            if (storedNode === node) {
              return id;
            }
          }
          return 0;
        }

        // Simulate dereference_pointer
        dereferencePointer(id) {
          if (id === 0) return null;
          return this.memory.get(id) || null;
        }

        add(value) {
          const node = new Node(value);
          const nodeId = this.nextId++;

          this.memory.set(nodeId, node);

          if (!this.head) {
            this.head = node;
            this.tail = node;
            return;
          }

          const tailId = this.getPointer(this.tail);

          // New node's both = prev XOR next
          node.both = tailId ^ 0;

          // Update current tail's both
          const prevId = this.tail.both; // tail's next is 0
          this.tail.both = prevId ^ nodeId;

          this.tail = node;
        }

        get(index) {
          let prevId = 0;
          let current = this.head;
          let currentIndex = 0;

          while (current && currentIndex < index) {
            const nextId = prevId ^ current.both;

            prevId = this.getPointer(current);
            current = this.dereferencePointer(nextId);

            currentIndex++;
          }

          return current;
        }
      }
    </script>
  </body>
</html>
