<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given an array of integers, return a new array where each element in the new array is the number of smaller elements to the right of that element in the original input array.

    </title>
</head>
<body>
    <script>
function countSmaller(nums) {
    let n = nums.length;
    let counts = new Array(n).fill(0);
    let indices = Array.from({ length: n }, (_, i) => i);

    function mergeSort(left, right) {
        if (right - left <= 1) return;

        let mid = Math.floor((left + right) / 2);
        mergeSort(left, mid);
        mergeSort(mid, right);

        let temp = [];
        let i = left, j = mid;
        let rightCount = 0;

        while (i < mid && j < right) {
            if (nums[indices[j]] < nums[indices[i]]) {
                temp.push(indices[j]);
                rightCount++;
                j++;
            } else {
                temp.push(indices[i]);
                counts[indices[i]] += rightCount;
                i++;
            }
        }

        while (i < mid) {
            temp.push(indices[i]);
            counts[indices[i]] += rightCount;
            i++;
        }

        while (j < right) {
            temp.push(indices[j]);
            j++;
        }

        for (let k = left; k < right; k++) {
            indices[k] = temp[k - left];
        }
    }

    mergeSort(0, n);
    return counts;
}

// Example
console.log(countSmaller([3, 4, 9, 6, 1]));
    </script>
</body>
</html>
