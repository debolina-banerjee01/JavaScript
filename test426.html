<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tower of Hanoi is a puzzle game with three rods and n disks, each a different size.

All the disks start off on the first rod in a stack. They are ordered by size, with the largest disk on the bottom and the smallest one at the top.

The goal of this puzzle is to move all the disks from the first rod to the last rod while following these rules:

You can only move one disk at a time.
A move consists of taking the uppermost disk from one of the stacks and placing it on top of another stack.
You cannot place a larger disk on top of a smaller disk.
Write a function that prints out all the steps necessary to complete the Tower of Hanoi. You should assume that the rods are numbered, with the first rod being 1, the second (auxiliary) rod being 2, and the last (goal) rod being 3.

For example, with n = 3, we can do this in 7 moves:

Move 1 to 3
Move 1 to 2
Move 3 to 2
Move 1 to 3
Move 2 to 1
Move 2 to 3
Move 1 to 3
    </title>
</head>
<body>
    <script>
function towerOfHanoi(n, fromRod = 1, auxRod = 2, toRod = 3) {
  // Base case
  if (n === 1) {
    console.log(`Move ${fromRod} to ${toRod}`);
    return;
  }

  // Move n-1 disks from source to auxiliary rod
  towerOfHanoi(n - 1, fromRod, toRod, auxRod);

  // Move the largest disk to destination rod
  console.log(`Move ${fromRod} to ${toRod}`);

  // Move n-1 disks from auxiliary rod to destination rod
  towerOfHanoi(n - 1, auxRod, fromRod, toRod);
}

// Example
towerOfHanoi(3);
    </script>
</body>
</html>
