<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given two non-empty binary trees s and t, check whether tree t has exactly
      the same structure and node values with a subtree of s. A subtree of s is
      a tree consists of a node in s and all of this node's descendants. The
      tree s could also be considered as a subtree of itself.
    </title>
  </head>
  <body>
    <script>
      class TreeNode {
        constructor(val, left = null, right = null) {
          this.val = val;
          this.left = left;
          this.right = right;
        }
      }

      // Check if two trees are identical
      function isSameTree(a, b) {
        if (a === null && b === null) return true;
        if (a === null || b === null) return false;

        if (a.val !== b.val) return false;

        return isSameTree(a.left, b.left) && isSameTree(a.right, b.right);
      }

      // Check if t is a subtree of s
      function isSubtree(s, t) {
        if (s === null) return false;

        // If current trees match
        if (isSameTree(s, t)) return true;

        // Otherwise search in left or right subtree
        return isSubtree(s.left, t) || isSubtree(s.right, t);
      }
    </script>
  </body>
</html>
