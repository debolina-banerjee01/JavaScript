    <title>Given an array of integers where every integer occurs three times except for one integer, which only occurs once, find and return the non-duplicated integer.

For example, given [6, 1, 3, 3, 3, 6, 6], return 1. Given [13, 19, 13, 13], return 19.

    </title>
</head>
<body>
    <script>
function singleNumber(nums) {
    let result = 0;

    for (let i = 0; i < 32; i++) {
        let sum = 0;

        for (let num of nums) {
            sum += (num >> i) & 1;
        }

        if (sum % 3 !== 0) {
            result |= (1 << i);
        }
    }

    return result;
}

// Examples
console.log(singleNumber([6, 1, 3, 3, 3, 6, 6])); // 1
console.log(singleNumber([13, 19, 13, 13]));     // 19
    </script>
</body>
</html>
