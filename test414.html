<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      An sorted array of integers was rotated an unknown number of times. Given
      such an array, find the index of the element in the array in faster than
      linear time. If the element doesn't exist in the array, return null. For
      example, given the array [13, 18, 25, 2, 8, 10] and the element 8, return
      4 (the index of 8 in the array). You can assume all the integers in the
      array are unique.
    </title>
  </head>
  <body>
    <script>
      function searchRotatedArray(arr, target) {
        let left = 0;
        let right = arr.length - 1;

        while (left <= right) {
          const mid = Math.floor((left + right) / 2);

          // Element found
          if (arr[mid] === target) {
            return mid;
          }

          // Left half is sorted
          if (arr[left] <= arr[mid]) {
            // Target lies inside the left sorted half
            if (target >= arr[left] && target < arr[mid]) {
              right = mid - 1;
            } else {
              left = mid + 1;
            }
          }
          // Right half is sorted
          else {
            // Target lies inside the right sorted half
            if (target > arr[mid] && target <= arr[right]) {
              left = mid + 1;
            } else {
              right = mid - 1;
            }
          }
        }

        return null;
      }

      // Example
      const arr = [13, 18, 25, 2, 8, 10];

      console.log(searchRotatedArray(arr, 8)); // 4
      console.log(searchRotatedArray(arr, 25)); // 2
      console.log(searchRotatedArray(arr, 7)); // null
    </script>
  </body>
</html>
