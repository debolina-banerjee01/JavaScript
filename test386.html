<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given an array of numbers and a number k, determine if there are three
      entries in the array which add up to the specified number k
    </title>
  </head>
  <body>
    <script>
      function hasThreeSum(arr, k) {
        arr.sort((a, b) => a - b); // Step 1: sort

        for (let i = 0; i < arr.length - 2; i++) {
          let left = i + 1;
          let right = arr.length - 1;

          while (left < right) {
            let sum = arr[i] + arr[left] + arr[right];

            if (sum === k) {
              return true;
            } else if (sum < k) {
              left++;
            } else {
              right--;
            }
          }
        }

        return false;
      }
      console.log(hasThreeSum([20, 303, 3, 4, 25], 49)); // true
    </script>
  </body>
</html>
