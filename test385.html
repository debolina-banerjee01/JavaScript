<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given two singly linked lists that intersect at some point, find the
      intersecting node. The lists are non-cyclical. For example, given A = 3 ->
      7 -> 8 -> 10 and B = 99 -> 1 -> 8 -> 10, return the node with value 8. In
      this example, assume nodes with the same value are the exact same node
      objects. Do this in O(M + N) time (where M and N are the lengths of the
      lists) and constant space. use javascript
    </title>
  </head>
  <body>
    <script>
      function getIntersectionNode(headA, headB) {
        if (!headA || !headB) return null;

        let p1 = headA;
        let p2 = headB;

        while (p1 !== p2) {
          // Move to next node or switch list
          p1 = p1 ? p1.next : headB;
          p2 = p2 ? p2.next : headA;
        }

        return p1; // either intersection node or null
      }
    </script>
  </body>
</html>
