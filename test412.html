<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are given a 2 x N board, and instructed to completely cover the board with the following shapes:

Dominoes, or 2 x 1 rectangles.
Trominoes, or L-shapes.

    </title>
</head>
<body>
    <script>
/**
 * Count the number of ways to tile a 2 x N board
 * using:
 * 1. Dominoes (2 x 1)
 * 2. Trominoes (L-shaped)
 *
 * Uses Dynamic Programming
 *
 * Time Complexity: O(N)
 * Space Complexity: O(N)
 */

function numTilings(N) {
    const MOD = 1000000007;

    // dp[i] = ways to fully tile 2 x i board
    const dp = new Array(N + 1).fill(0);

    // gap[i] = ways to tile 2 x i board with one square missing
    const gap = new Array(N + 1).fill(0);

    // Base cases
    dp[0] = 1;
    dp[1] = 1;

    if (N >= 2) {
        dp[2] = 2;
    }

    for (let i = 3; i <= N; i++) {
        // Full board transitions
        dp[i] = (
            dp[i - 1] +      // vertical domino
            dp[i - 2] +      // two horizontal dominoes
            2 * gap[i - 1]   // tromino placements
        ) % MOD;

        // Gap transitions
        gap[i] = (
            gap[i - 1] +     // extend gap
            dp[i - 2]        // create new gap with tromino
        ) % MOD;
    }

    return dp[N];
}

// Examples
console.log(numTilings(1)); // 1
console.log(numTilings(2)); // 2

    </script>
</body>
</html>
