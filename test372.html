<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      You are given an M by N matrix consisting of booleans that represents a
      board. Each True boolean represents a wall. Each False boolean represents
      a tile you can walk on. Given this matrix, a start coordinate, and an end
      coordinate, return the minimum number of steps required to reach the end
      coordinate from the start. If there is no possible path, then return null.
      You can move up, left, down, and right. You cannot move through walls. You
      cannot wrap around the edges of the board.
    </title>
  </head>
  <body>
    <script>
      function minSteps(board, start, end) {
        const M = board.length;
        const N = board[0].length;

        const [startRow, startCol] = start;
        const [endRow, endCol] = end;

        // Edge cases
        if (board[startRow][startCol] || board[endRow][endCol]) {
          return null; // start or end is a wall
        }

        const directions = [
          [1, 0], // down
          [-1, 0], // up
          [0, 1], // right
          [0, -1], // left
        ];

        const visited = Array.from({ length: M }, () => Array(N).fill(false));
        const queue = [[startRow, startCol, 0]];

        visited[startRow][startCol] = true;

        while (queue.length > 0) {
          const [row, col, steps] = queue.shift();

          // Reached destination
          if (row === endRow && col === endCol) {
            return steps;
          }

          for (let [dr, dc] of directions) {
            const newRow = row + dr;
            const newCol = col + dc;

            if (
              newRow >= 0 &&
              newCol >= 0 &&
              newRow < M &&
              newCol < N &&
              !visited[newRow][newCol] &&
              !board[newRow][newCol] // not a wall
            ) {
              visited[newRow][newCol] = true;
              queue.push([newRow, newCol, steps + 1]);
            }
          }
        }

        return null; // no path found
      }
      const board = [
        [false, false, false, false],
        [true, true, false, true],
        [false, false, false, false],
        [false, false, false, false],
      ];

      const start = [3, 0];
      const end = [0, 0];

      console.log(minSteps(board, start, end)); // Output: 7
    </script>
  </body>
</html>
