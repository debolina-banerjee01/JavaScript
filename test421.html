<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given an integer list where each number represents the number of hops you
      can make, determine whether you can reach to the last index starting at
      index 0. For example, [2, 0, 1, 0] returns True while [1, 1, 0, 1] returns
      False.
    </title>
  </head>
  <body>
    <script>
      function canReachEnd(nums) {
        let farthest = 0;

        for (let i = 0; i < nums.length; i++) {
          // If current index is unreachable
          if (i > farthest) {
            return false;
          }

          // Update farthest reachable index
          farthest = Math.max(farthest, i + nums[i]);

          // If we can already reach the last index
          if (farthest >= nums.length - 1) {
            return true;
          }
        }

        return true;
      }

      // Examples
      console.log(canReachEnd([2, 0, 1, 0])); // true
      console.log(canReachEnd([1, 1, 0, 1])); // false
    </script>
  </body>
</html>
