<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Find the maximum of two numbers without using any if-else statements,
      branching, or direct comparisons.
    </title>
  </head>
  <body>
    <script>
      function max(a, b) {
        // Difference between numbers
        let diff = a - b;

        // Extract sign bit
        // 0 if diff >= 0
        // -1 if diff < 0
        let k = diff >> 31;

        // If k = 0  => return a
        // If k = -1 => return b
        return a - (diff & k);
      }

      // Examples
      console.log(max(10, 20)); // 20
      console.log(max(50, 15)); // 50
      console.log(max(-5, -2)); // -2
    </script>
  </body>
</html>
