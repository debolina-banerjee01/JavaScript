<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      cons(a, b) constructs a pair, and car(pair) and cdr(pair) returns the
      first and last element of that pair. For example, car(cons(3, 4)) returns
      3, and cdr(cons(3, 4)) returns 4. Given this implementation of cons: def
      cons(a, b): def pair(f): return f(a, b) return pair Implement car and cdr
    </title>
  </head>
  <body>
    <script>
      // cons implementation
      function cons(a, b) {
        return function pair(f) {
          return f(a, b);
        };
      }

      // car returns the first element
      function car(pair) {
        return pair(function (a, b) {
          return a;
        });
      }

      // cdr returns the second element
      function cdr(pair) {
        return pair(function (a, b) {
          return b;
        });
      }

      // Example usage
      const p = cons(3, 4);

      console.log(car(p)); // 3
      console.log(cdr(p)); // 4
    </script>
  </body>
</html>
