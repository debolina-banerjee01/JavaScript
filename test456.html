<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      In academia, the h-index is a metric used to calculate the impact of a
      researcher's papers. It is calculated as follows: A researcher has index h
      if at least h of her N papers have h citations each. If there are multiple
      h satisfying this formula, the maximum is chosen. For example, suppose N =
      5, and the respective citations of each paper are [4, 3, 0, 1, 5]. Then
      the h-index would be 3, since the researcher has 3 papers with at least 3
      citations. Given a list of paper citations of a researcher, calculate
      their h-index.
    </title>
  </head>
  <body>
    <script>
      function hIndex(citations) {
        // Sort citations in descending order
        citations.sort((a, b) => b - a);

        let h = 0;

        for (let i = 0; i < citations.length; i++) {
          if (citations[i] >= i + 1) {
            h = i + 1;
          } else {
            break;
          }
        }

        return h;
      }

      // Example
      const citations = [4, 3, 0, 1, 5];
      console.log(hIndex(citations)); // Output: 3
    </script>
  </body>
</html>
