<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
       Given a list of integers, return the largest product that can be made by multiplying any three integers.

For example, if the list is [-10, -10, 5, 2], we should return 500, since that's -10 * -10 * 5.

You can assume the list has at least three integers.

    </title>
</head>
<body>
    <script>
        function largestProductOfThree(nums) {
    let max1 = -Infinity, max2 = -Infinity, max3 = -Infinity;
    let min1 = Infinity, min2 = Infinity;

    for (const num of nums) {
        // Update largest three
        if (num > max1) {
            max3 = max2;
            max2 = max1;
            max1 = num;
        } else if (num > max2) {
            max3 = max2;
            max2 = num;
        } else if (num > max3) {
            max3 = num;
        }

        // Update smallest two
        if (num < min1) {
            min2 = min1;
            min1 = num;
        } else if (num < min2) {
            min2 = num;
        }
    }

    return Math.max(
        max1 * max2 * max3,
        max1 * min1 * min2
    );
}

// Example usage
console.log(largestProductOfThree([-10, -10, 5, 2])); // 500

console.log(largestProductOfThree([-5, -4, -3, -2])); // -24
console.log(largestProductOfThree([-10, -10, 1, 3, 2])); // 300
    </script>
</body>
</html>
