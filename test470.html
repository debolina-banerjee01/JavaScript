<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write an algorithm to justify text. Given a sequence of words and an integer line length k, return a list of strings which represents each line, fully justified.

More specifically, you should have as many words as possible in each line. There should be at least one space between each word. Pad extra spaces when necessary so that each line has exactly length k. Spaces should be distributed as equally as possible, with the extra spaces, if any, distributed starting from the left.

If you can only fit one word on a line, then you should pad the right-hand side with spaces.

Each word is guaranteed not to be longer than k.

For example, given the list of words ["the", "quick", "brown", "fox", "jumps", "over", "the", "lazy", "dog"] and k = 16, you should return the following:

["the  quick brown", # 1 extra space on the left
"fox  jumps  over", # 2 extra spaces distributed evenly
"the   lazy   dog"] # 4 extra spaces distributed evenly

    </title>
</head>
<body>
    <script>
function justifyText(words, k) {
    const result = [];
    let i = 0;

    while (i < words.length) {
        let lineLength = words[i].length;
        let j = i + 1;

        // Find the maximum number of words that fit on this line.
        while (
            j < words.length &&
            lineLength + 1 + words[j].length <= k
        ) {
            lineLength += 1 + words[j].length;
            j++;
        }

        const lineWords = words.slice(i, j);
        const gaps = lineWords.length - 1;

        // Total characters occupied by words only.
        const wordLength = lineWords.reduce((sum, word) => sum + word.length, 0);

        let line = "";

        // If only one word, pad with spaces on the right.
        if (gaps === 0) {
            line = lineWords[0] + " ".repeat(k - wordLength);
        } else {
            const totalSpaces = k - wordLength;
            const spacesPerGap = Math.floor(totalSpaces / gaps);
            let extraSpaces = totalSpaces % gaps;

            for (let g = 0; g < gaps; g++) {
                line += lineWords[g];

                // Leftmost gaps receive the extra spaces.
                line += " ".repeat(
                    spacesPerGap + (extraSpaces > 0 ? 1 : 0)
                );

                if (extraSpaces > 0) {
                    extraSpaces--;
                }
            }

            line += lineWords[gaps];
        }

        result.push(line);
        i = j;
    }

    return result;
}
const words = [
    "the", "quick", "brown", "fox",
    "jumps", "over", "the", "lazy", "dog"
];

console.log(justifyText(words, 16));
    </script>
</body>
</html>
