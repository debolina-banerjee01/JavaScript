<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Determine whether there exists a one-to-one character mapping from one
      string s1 to another s2. For example, given s1 = abc and s2 = bcd, return
      true since we can map a to b, b to c, and c to d. Given s1 = foo and s2 =
      bar, return false since the o cannot map to two characters.
    </title>
  </head>
  <body>
    <script>
      function hasOneToOneMapping(s1, s2) {
        if (s1.length !== s2.length) {
          return false;
        }

        const map1 = new Map(); // s1 -> s2
        const map2 = new Map(); // s2 -> s1

        for (let i = 0; i < s1.length; i++) {
          const ch1 = s1[i];
          const ch2 = s2[i];

          if (map1.has(ch1)) {
            if (map1.get(ch1) !== ch2) {
              return false;
            }
          } else {
            map1.set(ch1, ch2);
          }

          if (map2.has(ch2)) {
            if (map2.get(ch2) !== ch1) {
              return false;
            }
          } else {
            map2.set(ch2, ch1);
          }
        }

        return true;
      }
      console.log(hasOneToOneMapping("abc", "bcd"));
      // true
    </script>
  </body>
</html>
