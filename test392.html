    <title>Write a program to determine how many distinct ways there are to create a max heap from a list of N given integers.

For example, if N = 3, and our integers are [1, 2, 3], there are two ways, shown below.
    </title>
</head>
<body>
    <script>
function countMaxHeaps(n) {
    const dp = new Array(n + 1).fill(-1);
    const nCr = Array.from({ length: n + 1 }, () => new Array(n + 1).fill(0));

    // Precompute combinations (Pascal's Triangle)
    for (let i = 0; i <= n; i++) {
        nCr[i][0] = nCr[i][i] = 1;
        for (let j = 1; j < i; j++) {
            nCr[i][j] = nCr[i - 1][j - 1] + nCr[i - 1][j];
        }
    }

    function getLeft(n) {
        if (n === 1) return 0;

        let h = Math.floor(Math.log2(n));
        let nodesH = 1 << h; // 2^h
        let lastLevel = n - ((1 << h) - 1);

        let left = (1 << (h - 1)) - 1 + Math.min(lastLevel, 1 << (h - 1));
        return left;
    }

    function solve(n) {
        if (n <= 1) return 1;
        if (dp[n] !== -1) return dp[n];

        let left = getLeft(n);
        let right = n - 1 - left;

        dp[n] = nCr[n - 1][left] * solve(left) * solve(right);
        return dp[n];
    }

    return solve(n);
}

// Example
console.log(countMaxHeaps(3)); // Output: 2
    </script>
</body>
