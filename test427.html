<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Given a number represented by a list of digits, find the next greater permutation of a number, in terms of lexicographic ordering. If there is not greater permutation possible, return the permutation with the lowest value/ordering.

For example, the list [1,2,3] should return [1,3,2]. The list [1,3,2] should return [2,1,3]. The list [3,2,1] should return [1,2,3].

Can you perform the operation without allocating extra memory (disregarding the input memory)?
    </title>
</head>
<body>
    <script>
function nextPermutation(nums) {
  let i = nums.length - 2;

  // Step 1: Find first decreasing element
  while (i >= 0 && nums[i] >= nums[i + 1]) {
    i--;
  }

  // Step 2: Find element just larger than nums[i]
  if (i >= 0) {
    let j = nums.length - 1;

    while (nums[j] <= nums[i]) {
      j--;
    }

    // Swap
    [nums[i], nums[j]] = [nums[j], nums[i]];
  }

  // Step 3: Reverse suffix
  reverse(nums, i + 1, nums.length - 1);

  return nums;
}

function reverse(arr, left, right) {
  while (left < right) {
    [arr[left], arr[right]] = [arr[right], arr[left]];
    left++;
    right--;
  }
}

// Examples
console.log(nextPermutation([1, 2, 3])); // [1, 3, 2]
console.log(nextPermutation([1, 3, 2])); // [2, 1, 3]
console.log(nextPermutation([3, 2, 1])); // [1, 2, 3]
    </script>
</body>
</html>
