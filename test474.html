<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Given an array of numbers N and an integer k, your task is to split N into
      k partitions such that the maximum sum of any partition is minimized.
      Return this sum. For example, given N = [5, 1, 2, 7, 3, 4] and k = 3, you
      should return 8, since the optimal partition is [5, 1, 2], [7], [3, 4].
    </title>
  </head>
  <body>
    <script>
      function minimizeLargestPartitionSum(nums, k) {
        let left = Math.max(...nums);
        let right = nums.reduce((sum, num) => sum + num, 0);

        while (left < right) {
          const mid = Math.floor((left + right) / 2);

          if (canPartition(nums, k, mid)) {
            right = mid;
          } else {
            left = mid + 1;
          }
        }

        return left;
      }

      function canPartition(nums, k, maxSum) {
        let partitions = 1;
        let currentSum = 0;

        for (const num of nums) {
          if (currentSum + num > maxSum) {
            partitions++;
            currentSum = num;

            if (partitions > k) {
              return false;
            }
          } else {
            currentSum += num;
          }
        }

        return true;
      }
      const nums = [5, 1, 2, 7, 3, 4];
      const k = 3;

      console.log(minimizeLargestPartitionSum(nums, k));
    </script>
  </body>
